name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container: ubuntu:20.04

    steps:
      - name: Install basic tools for checkout
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git ca-certificates curl wget unzip zip

      - name: Checkout wrapper repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            bc bison build-essential ccache curl flex \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            git libncurses5-dev libssl-dev libelf-dev \
            make python2 python2-minimal unzip wget zip

          ln -sf /usr/bin/python2 /usr/bin/python

          echo "Python version:"
          python --version

          echo "GCC version:"
          gcc --version

      - name: Clone kernel source
        run: |
          git clone --depth=1 --single-branch \
            -b dandelion-q-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
            kernel

      - name: Download HID patch
        run: |
          wget -O hid-gadget.patch \
            https://raw.githubusercontent.com/pelya/android-keyboard-gadget/master/patches/existing_tested/by-generic-kernel-version/generic_kernel_3.18.patch

          ls -lh hid-gadget.patch

      - name: Debug kernel source structure
        run: |
          cd kernel

          echo "Kernel version:"
          make kernelversion || true

          echo "Available dandelion configs:"
          find arch/arm64/configs -maxdepth 1 -type f | grep -i "dandelion" || true

          echo "Search android.c:"
          find . -name "android.c" -print || true

          echo "Search f_hid.c:"
          find . -name "f_hid.c" -print || true

          echo "Search android.h:"
          find . -name "android.h" -print || true

          echo "USB gadget files:"
          find drivers/usb/gadget -maxdepth 5 -type f -print | head -300 || true

      - name: Test HID patch
        run: |
          cd kernel

          echo "Testing HID patch with -p1..."
          if patch --batch --dry-run -p1 < ../hid-gadget.patch; then
            echo "HID patch is compatible."
          else
            echo "::warning::HID patch is NOT compatible with this kernel source."
          fi

      - name: Apply HID patch if compatible
        run: |
          cd kernel

          if patch --batch --dry-run -p1 < ../hid-gadget.patch; then
            echo "Applying HID patch..."
            patch --batch -p1 < ../hid-gadget.patch
          else
            echo "::warning::Skipping HID patch because it does not match this kernel source."
            echo "::warning::Build will continue with existing CONFIGFS HID/RNDIS options."
          fi
      - name: Fix MTK devfreq headers
        run: |
          cd kernel

          echo "Fixing helio-dvfsrc include path..."

          cat >> drivers/devfreq/Makefile <<'EOF'

          # Fix for MTK/Xiaomi kernel build on external toolchain
          ccflags-y += -I$(srctree)/drivers/devfreq
          ccflags-y += -I$(srctree)/drivers/misc/mediatek/mmp/
          EOF

          echo "Patching local include style..."
          sed -i 's/#include <helio-dvfsrc.h>/#include "helio-dvfsrc.h"/g' \
            drivers/devfreq/helio-dvfsrc-opp.c || true

          sed -i 's/#include <helio-dvfsrc-mt6765.h>/#include "helio-dvfsrc-mt6765.h"/g' \
            drivers/devfreq/helio-dvfsrc.h || true

          echo "Checking helio-dvfsrc headers:"
          find drivers/devfreq -name "helio-dvfsrc*.h" -print || true

          echo "drivers/devfreq/Makefile tail:"
          tail -30 drivers/devfreq/Makefile 
      - name: Force MT6765 DVFSRC register header
        run: |
          cd kernel

          echo "Forcing MT6765 DVFSRC register header..."

          cat > drivers/devfreq/mtk_dvfsrc_reg.h <<'EOF'
          /*
           * Forced MT6765 DVFSRC register map for dandelion / Redmi 9A.
           * Xiaomi/MTK source sometimes does not select CONFIG_MACH_MT6765
           * correctly during external kernel build.
           */
          #ifndef __MTK_DVFSRC_REG_H
          #define __MTK_DVFSRC_REG_H

          #include "mtk_dvfsrc_reg_mt6765.h"

          #endif /* __MTK_DVFSRC_REG_H */
          EOF

          echo "Checking DVFSRC register definitions:"
          grep -n "DVFSRC_EMI_REQUEST" drivers/devfreq/mtk_dvfsrc_reg_mt6765.h || true
          grep -n "DVFSRC_SW_BW_0" drivers/devfreq/mtk_dvfsrc_reg_mt6765.h || true
          grep -n "DVFSRC_RSRV_0" drivers/devfreq/mtk_dvfsrc_reg_mt6765.h || true

      - name: Force direct MT6765 DVFSRC include
        run: |
          cd kernel

          echo "Forcing direct include of MT6765 DVFSRC registers..."

          echo "Available DVFSRC headers:"
          find drivers/devfreq -name "*dvfsrc*reg*.h" -print || true
          find drivers/devfreq -name "*dvfsrc*.h" -print || true

          echo "Checking needed register definitions:"
          grep -R "DVFSRC_EMI_REQUEST" -n drivers/devfreq || true
          grep -R "DVFSRC_VCORE_REQUEST" -n drivers/devfreq || true
          grep -R "DVFSRC_LEVEL_LABEL" -n drivers/devfreq || true

          echo "Adding direct include into helio-dvfsrc-mt6765.c..."
          if ! grep -q 'mtk_dvfsrc_reg_mt6765.h' drivers/devfreq/helio-dvfsrc-mt6765.c; then
            sed -i '/#include.*helio-dvfsrc.h/a #include "mtk_dvfsrc_reg_mt6765.h"' \
              drivers/devfreq/helio-dvfsrc-mt6765.c
          fi

          echo "Adding include path to drivers/devfreq/Makefile..."
          cat >> drivers/devfreq/Makefile <<'EOF'

          # MT6765 DVFSRC build fix
          ccflags-y += -I$(srctree)/drivers/devfreq
          EOF

          echo "Resulting includes:"
          grep -n "#include" drivers/devfreq/helio-dvfsrc-mt6765.c | head -30
      - name: Fix old kernel scripts for modern compiler
        run: |
          cd kernel

          echo "Fixing GCC 10+ dtc yylloc issue..."
          echo 'HOSTCFLAGS += -fcommon' >> Makefile

          echo "Python:"
          python --version
      - name: Fix MTK kpd printk format
        run: |
          cd kernel

          echo "Fixing MTK keyboard printk format warning..."

          grep -n "kpdwr_status" drivers/input/keyboard/mediatek/kpd.c || true

          sed -i \
            's/kpdwr_status = %d\\n", kpdwr_status/kpdwr_status = %lu\\n", kpdwr_status/g' \
            drivers/input/keyboard/mediatek/kpd.c

          echo "After patch:"
          grep -n "kpdwr_status" drivers/input/keyboard/mediatek/kpd.c || true
          
      - name: Build kernel Image.gz-dtb
        run: |
          cd kernel

          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          export KCFLAGS="-Wno-error"
          export HOSTCFLAGS="-fcommon -Wno-error"
          export PYTHON=/usr/bin/python2

          echo "Using python:"
          python --version
          $PYTHON --version

          echo "Using original kernel dandelion_defconfig..."
          make dandelion_defconfig

          echo "Merging local config fragment..."
          cat ../dandelion_defconfig >> .config

          echo "Disabling broken stack protector options..."
          scripts/config --disable CC_STACKPROTECTOR || true
          scripts/config --disable CC_STACKPROTECTOR_REGULAR || true
          scripts/config --disable CC_STACKPROTECTOR_STRONG || true

          sed -i \
            -e 's/^CONFIG_CC_STACKPROTECTOR=y/# CONFIG_CC_STACKPROTECTOR is not set/' \
            -e 's/^CONFIG_CC_STACKPROTECTOR_REGULAR=y/# CONFIG_CC_STACKPROTECTOR_REGULAR is not set/' \
            -e 's/^CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/' \
            .config

          make olddefconfig

          echo "Final stack protector config:"
          grep -E "CONFIG_CC_STACKPROTECTOR" .config || true

          echo "Final HID/RNDIS config:"
          grep -E "CONFIG_USB_GADGET|CONFIG_USB_CONFIGFS|CONFIG_USB_CONFIGFS_F_HID|CONFIG_USB_CONFIGFS_RNDIS|CONFIG_HID|CONFIG_USB_HID" .config || true

          echo "Building..."
          make -j$(nproc) HOSTCFLAGS="-fcommon -Wno-error" Image.gz-dtb

          echo "Built files:"
          ls -lh arch/arm64/boot/Image.gz-dtb

      - name: Prepare flashable ZIP
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel

          cp -f anykernel.sh AnyKernel/anykernel.sh
          cp -f kernel/arch/arm64/boot/Image.gz-dtb AnyKernel/Image.gz-dtb

          rm -rf AnyKernel/.git AnyKernel/.github

          cd AnyKernel
          zip -r9 ../Kernel.zip ./*

          cd ..
          ls -lh Kernel.zip

      - name: Upload flashable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Kernel
          path: Kernel.zip
